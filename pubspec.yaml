name: rick_and_morty_character
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.3.7

  intl: ^0.20.2

  logger: ^2.0.1
  google_fonts: ^6.2.1

  # For make request get, post , put and delete
  dio: ^5.9.0
  # For routing
  go_router: ^17.0.1
  flutter_svg: ^2.2.3
  flutter_dotenv: ^6.0.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  hive_generator:
  build_runner:

